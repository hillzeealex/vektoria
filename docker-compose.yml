services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - SVS_DATA_DIR=/app/data
      - SVS_EMBED_BACKEND=ollama
      - SVS_EMBED_MODEL=nomic-embed-text
      - SVS_OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # After first start, run: docker exec ollama ollama pull nomic-embed-text

volumes:
  ollama_data:
