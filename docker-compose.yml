services:
  vektoria:
    build: .
    # Bound to localhost by default — reach it through an SSH tunnel
    # (ssh -L 8000:localhost:8000 user@your-vps) or a TLS reverse proxy.
    # For public exposure: change to "8000:8000" AND set VK_API_KEY below.
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - vektoria-data:/data
    environment:
      - VK_DATA_DIR=/data
      # Require a Bearer API key on every /v1 route (recommended if exposed):
      # - VK_API_KEY=change-me
      # Scope CORS to your app's origin (never "*"):
      # - VK_CORS_ORIGINS=https://app.example.com
      # Server-side embedding for /ingest and text queries (ONNX, no torch):
      - VK_EMBED_BACKEND=fastembed
      - VK_EMBED_MODEL=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    restart: unless-stopped

volumes:
  vektoria-data:
